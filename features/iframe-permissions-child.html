<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Iframe Permissions Child</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.4;
      margin: 12px;
      color: #111;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    button {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      padding: 6px 14px;
      cursor: pointer;
    }
    .status {
      margin-top: 8px;
      padding: 6px 8px;
      background: #f7f7f7;
      border: 1px solid #d0d0d0;
      font-size: 0.9em;
      white-space: pre-wrap;
      min-height: 1.4em;
    }
    .origin-info {
      font-size: 0.85em;
      color: #555;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
<p class="origin-info">Child origin: <code id="child-origin"></code></p>

<div class="buttons">
  <button data-permission="geolocation">Geolocation</button>
  <button data-permission="camera">Camera</button>
  <button data-permission="microphone">Microphone</button>
  <button data-permission="drm">DRM (EME)</button>
</div>
<div class="status" id="status">Ready</div>

<script>
  document.getElementById('child-origin').textContent = location.origin;

  function postResult(permission, outcome, detail) {
    const msg = { type: 'permission-result', permission, outcome, detail, origin: location.origin };
    if (window.parent !== window) {
      window.parent.postMessage(msg, '*');
    }
  }

  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  async function requestGeolocation() {
    if (!navigator.geolocation) {
      setStatus('Geolocation: API not available');
      postResult('geolocation', 'error', 'API not available');
      return;
    }
    setStatus('Geolocation: requesting...');
    navigator.geolocation.getCurrentPosition(
      () => {
        setStatus('Geolocation: granted');
        postResult('geolocation', 'granted', '');
      },
      (err) => {
        const outcome = err.code === 1 ? 'denied' : 'error';
        setStatus(`Geolocation: ${outcome} — ${err.message}`);
        postResult('geolocation', outcome, err.message);
      },
    );
  }

  async function requestCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Camera: getUserMedia not available');
      postResult('camera', 'error', 'getUserMedia not available');
      return;
    }
    setStatus('Camera: requesting...');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      stream.getTracks().forEach((t) => t.stop());
      setStatus('Camera: granted');
      postResult('camera', 'granted', '');
    } catch (e) {
      const outcome = e.name === 'NotAllowedError' ? 'denied' : 'error';
      setStatus(`Camera: ${outcome} — ${e.message}`);
      postResult('camera', outcome, e.message);
    }
  }

  async function requestMicrophone() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Microphone: getUserMedia not available');
      postResult('microphone', 'error', 'getUserMedia not available');
      return;
    }
    setStatus('Microphone: requesting...');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      stream.getTracks().forEach((t) => t.stop());
      setStatus('Microphone: granted');
      postResult('microphone', 'granted', '');
    } catch (e) {
      const outcome = e.name === 'NotAllowedError' ? 'denied' : 'error';
      setStatus(`Microphone: ${outcome} — ${e.message}`);
      postResult('microphone', outcome, e.message);
    }
  }

  async function requestDRM() {
    if (!navigator.requestMediaKeySystemAccess) {
      setStatus('DRM: Encrypted Media Extensions not available');
      postResult('drm', 'error', 'EME not available');
      return;
    }
    setStatus('DRM: requesting...');
    const configs = [{
      initDataTypes: ['cenc'],
      videoCapabilities: [{ contentType: 'video/mp4; codecs="avc1.42E01E"' }],
    }];
    try {
      await navigator.requestMediaKeySystemAccess('com.widevine.alpha', configs);
      setStatus('DRM: access granted (Widevine)');
      postResult('drm', 'granted', 'Widevine');
    } catch (e1) {
      try {
        await navigator.requestMediaKeySystemAccess('com.apple.fps.1_0', configs);
        setStatus('DRM: access granted (FairPlay)');
        postResult('drm', 'granted', 'FairPlay');
      } catch (e2) {
        setStatus(`DRM: not available — ${e1.message}`);
        postResult('drm', 'error', e1.message);
      }
    }
  }

  const handlers = {
    geolocation: requestGeolocation,
    camera: requestCamera,
    microphone: requestMicrophone,
    drm: requestDRM,
  };

  document.querySelectorAll('button[data-permission]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const fn = handlers[btn.dataset.permission];
      if (fn) fn();
    });
  });
</script>
</body>
</html>
